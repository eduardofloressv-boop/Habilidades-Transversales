<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recursos Digitales - Psic. Eduardo Flores</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Roboto, Arial, sans-serif; 
            background-color: #f8fafc; 
            color: #1e293b; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        .card { 
            background: white;
            padding: 2.5rem; 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            text-align: center; 
            max-width: 400px; 
            width: 90%; 
            border-top: 8px solid #6366f1;
            position: relative;
        }

        /* Encabezado sin imagen */
        .header-icon {
            color: #6366f1;
            margin-bottom: 1rem;
        }

        h1 { color: #0f172a; font-size: 1.7rem; margin: 0; font-weight: 800; }
        .subtitle { color: #64748b; font-size: 0.9rem; margin-top: 0.5rem; margin-bottom: 2rem; line-height: 1.4; }

        /* Menú de Recursos */
        .btn-menu { 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: white; 
            text-decoration: none; 
            padding: 14px; 
            margin-bottom: 12px; 
            border-radius: 12px; 
            transition: all 0.2s ease; 
            font-weight: 600;
            font-size: 0.95rem;
        }

        .btn-gender { background-color: #8b5cf6; }
        .btn-jobs { background-color: #3b82f6; }
        .btn-skills { background-color: #10b981; }

        .btn-menu:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Botón de WhatsApp aparte abajo */
        .btn-wa-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #15803d;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.85rem;
            margin-top: 1.5rem;
            padding: 8px 16px;
            background-color: #f0fdf4;
            border-radius: 50px;
            transition: all 0.2s;
        }
        .btn-wa-link:hover { background-color: #dcfce7; }

        .footer { 
            margin-top: 2rem; 
            font-size: 0.8rem; 
            color: #94a3b8; 
            border-top: 1px solid #f1f5f9; 
            padding-top: 1.5rem; 
        }
        .name { font-weight: 700; color: #1e293b; display: block; margin-bottom: 2px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header-icon">
            <i data-lucide="book-open-check" style="width: 48px; height: 48px; margin: 0 auto;"></i>
        </div>

        <h1>Centro de Recursos</h1>
        <p class="subtitle">Psic. Samuel Eduardo Flores León<br>Especialista en Educación</p>
        
        <nav>
            <a href="https://eduardofloressv-boop.github.io/Educaci-n-con-enfoque-de-g-nero/" class="btn-menu btn-gender" target="_blank">
                <i data-lucide="sparkles" size="18"></i> Educación con Enfoque de Género
            </a>

            <a href="https://eduardofloressv-boop.github.io/Infografia-Empleabilidad/" class="btn-menu btn-jobs" target="_blank">
                <i data-lucide="file-text" size="18"></i> Guía de Empleabilidad y C.V.
            </a>

            <a href="https://eduardofloressv-boop.github.io/Introduccion-a-las-Habilidades-para-la-vida/" class="btn-menu btn-skills" target="_blank">
                <i data-lucide="brain" size="18"></i> Habilidades para la Vida
            </a>
        </nav>

        <a href="https://wa.me/50363135528" class="btn-wa-link" target="_blank">
            <i data-lucide="message-circle" size="16"></i> Citas WhatsApp: 6313-5528
        </a>
        
        <div class="footer">
            <span class="name">Hecho por: Psic. Eduardo Flores</span>
            Psicología Social y Formación Docente<br>
            El Salvador, 2026
        </div>
    </div>

    <script>
        // Inicializa los iconos automáticamente
        lucide.createIcons();
    </script>
</body>
</html>
